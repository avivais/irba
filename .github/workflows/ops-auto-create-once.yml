name: Ops auto-create once

on:
  workflow_dispatch:

jobs:
  run:
    name: Diagnose and run auto-create once
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ec2-98-84-90-118.compute-1.amazonaws.com >> ~/.ssh/known_hosts

      - name: Diagnose cron and run auto-create
        run: |
          ssh -i ~/.ssh/deploy_key.pem ubuntu@ec2-98-84-90-118.compute-1.amazonaws.com bash <<'REMOTE'
            set -euo pipefail
            cd /opt/irba

            echo "## Server time"
            date
            TZ=Asia/Jerusalem date

            echo "## Current deployed commit"
            git rev-parse --short HEAD || true

            echo "## Crontab auto-create entries"
            crontab -l 2>/dev/null | grep -E 'auto-create|auto-close|prune-audit|backup' || echo "NO_CRONTAB_OR_NO_MATCH"

            echo "## Recent cron log"
            tail -80 /opt/irba/cron.log 2>/dev/null || echo "NO_CRON_LOG"

            echo "## Docker status"
            docker compose ps

            echo "## Run auto-create endpoint once"
            CRON_SECRET=$(grep '^CRON_SECRET=' /opt/irba/.env | cut -d= -f2- | tr -d '"')
            if [ -z "$CRON_SECRET" ]; then
              echo "MISSING_CRON_SECRET"
              exit 1
            fi
            curl -sS -H "Authorization: Bearer $CRON_SECRET" https://irba.club/api/cron/auto-create
            echo

            echo "## Recent app log after run"
            docker logs irba-app-1 --tail 80

            echo "## Recent WA log after run"
            docker logs irba-wa-1 --tail 80
          REMOTE
