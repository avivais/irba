name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to deploy
        required: false
        default: main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ec2-98-84-90-118.compute-1.amazonaws.com >> ~/.ssh/known_hosts

      - name: Backup database
        run: |
          ssh -i ~/.ssh/deploy_key.pem ubuntu@ec2-98-84-90-118.compute-1.amazonaws.com \
            "/opt/irba/scripts/backup.sh || echo 'Warning: backup failed — continuing'"

      - name: Pull latest code
        run: |
          ssh -i ~/.ssh/deploy_key.pem ubuntu@ec2-98-84-90-118.compute-1.amazonaws.com bash <<'EOF'
            set -euo pipefail
            cd /opt/irba
            TARGET="${{ github.event.inputs.ref || 'main' }}"
            echo "Pulling $TARGET..."
            git fetch origin
            git log --oneline HEAD..origin/$TARGET | head -10 || true
            git checkout $TARGET
            git pull --ff-only origin $TARGET
            echo "Now at: $(git log -1 --oneline)"
          EOF

      - name: Build Docker images
        run: |
          ssh -i ~/.ssh/deploy_key.pem ubuntu@ec2-98-84-90-118.compute-1.amazonaws.com bash <<'EOF'
            set -euo pipefail
            cd /opt/irba
            COMMIT_HASH=$(git rev-parse --short HEAD)
            COMMIT_DATE=$(git log -1 --format='%cI')
            echo "Building commit $COMMIT_HASH ($COMMIT_DATE)"
            COMMIT_HASH=$COMMIT_HASH COMMIT_DATE=$COMMIT_DATE \
              docker compose build --progress=plain 2>&1
          EOF

      - name: Restart containers
        run: |
          ssh -i ~/.ssh/deploy_key.pem ubuntu@ec2-98-84-90-118.compute-1.amazonaws.com bash <<'EOF'
            set -euo pipefail
            cd /opt/irba
            docker compose up -d
            echo ""
            echo "Container status:"
            docker compose ps
          EOF

      - name: Health check
        run: |
          echo "Waiting 10s for app to start..."
          sleep 10
          ssh -i ~/.ssh/deploy_key.pem ubuntu@ec2-98-84-90-118.compute-1.amazonaws.com \
            'curl -sf https://irba.sportgroup.cl/api/health && echo "" || (echo "Health check failed" && exit 1)'
