name: Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to deploy
        required: false
        default: main

# Don't run two deploys against EC2 at the same time.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Resolve deploy SHA
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Wait for image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/irba/app
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          # Public GHCR images don't need auth for HEAD on the manifest; this
          # blocks deploy until the build-image workflow has published the SHA.
          for i in $(seq 1 30); do
            if docker manifest inspect "${IMAGE,,}:$SHA" >/dev/null 2>&1; then
              echo "Image ${IMAGE,,}:$SHA is available."
              exit 0
            fi
            echo "Waiting for ${IMAGE,,}:$SHA ($i/30)..."
            sleep 10
          done
          echo "Image $SHA never published. Check the build-image workflow."
          exit 1

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ec2-98-84-90-118.compute-1.amazonaws.com >> ~/.ssh/known_hosts

      - name: Backup database
        run: |
          ssh -i ~/.ssh/deploy_key.pem ubuntu@ec2-98-84-90-118.compute-1.amazonaws.com \
            "/opt/irba/scripts/backup.sh || echo 'Warning: backup failed — continuing'"

      - name: Pull image and restart
        env:
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key.pem ubuntu@ec2-98-84-90-118.compute-1.amazonaws.com bash <<REMOTE
            set -euo pipefail
            cd /opt/irba
            git fetch origin
            git checkout ${{ github.event.inputs.ref || 'main' }}
            git pull --ff-only origin ${{ github.event.inputs.ref || 'main' }}

            export IRBA_APP_IMAGE=ghcr.io/avivais/irba/app:$SHA
            export IRBA_WA_IMAGE=ghcr.io/avivais/irba/wa:$SHA

            docker compose pull
            docker compose up -d
            docker compose ps
            # Aggressive prune (older than 7 days, not currently in use). Plain
            # `image prune -f` only removes dangling layers and let stale tagged
            # builds accumulate to ~7 GB on the 38 GB box.
            docker image prune -af --filter "until=168h" >/dev/null 2>&1 || true
            docker builder prune -af --filter "until=168h" >/dev/null 2>&1 || true
          REMOTE

      - name: Health check
        run: |
          sleep 8
          curl -sf https://irba.sportgroup.cl/api/health
