name: Ops switch assistant group

on:
  workflow_dispatch:

jobs:
  run:
    name: Switch OpenClaw assistant allowlist to IRBA 2026
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ec2-98-84-90-118.compute-1.amazonaws.com >> ~/.ssh/known_hosts

      - name: Update AppConfig and smoke test
        run: |
          ssh -i ~/.ssh/deploy_key.pem ubuntu@ec2-98-84-90-118.compute-1.amazonaws.com bash <<'REMOTE'
            set -euo pipefail
            cd /opt/irba

            export NEW_GROUP='972507666550-1441540291@g.us'
            export ACTOR_PHONE='+972507666550'

            echo "## Times"
            date
            TZ=Asia/Jerusalem date

            echo "## Deployed commit"
            git rev-parse --short HEAD || true

            echo "## WA groups containing IRBA"
            curl -sS http://localhost:3100/groups | python3 -c 'import json,sys; data=json.load(sys.stdin); [print(f"{g.get(chr(105)+chr(100))} :: {g.get(chr(115)+chr(117)+chr(98)+chr(106)+chr(101)+chr(99)+chr(116))}") for g in data if "IRBA" in (g.get(chr(115)+chr(117)+chr(98)+chr(106)+chr(101)+chr(99)+chr(116)) or "") ]' || true

            echo "## Current relevant AppConfig"
            docker exec irba-db-1 psql -U irba -d irba -tAc "select key || '=' || value from \"AppConfig\" where key in ('assistant_allowed_groups','wa_group_jid') order by key;"

            OLD_GROUPS=$(docker exec irba-db-1 psql -U irba -d irba -tAc "select value from \"AppConfig\" where key='assistant_allowed_groups';" || true)

            echo "## Updating assistant_allowed_groups"
            docker exec irba-db-1 psql -U irba -d irba -v ON_ERROR_STOP=1 \
              -v new_group="$NEW_GROUP" \
              -v old_groups="$OLD_GROUPS" \
              <<'SQL'
            insert into "AppConfig" (key, value, "updatedAt")
            values ('assistant_allowed_groups', :'new_group', now())
            on conflict (key) do update set value = excluded.value, "updatedAt" = now();

            insert into "AuditLog" (actor, action, "entityType", "entityId", before, after)
            values (
              'ops-openclaw',
              'UPDATE_CONFIG',
              'AppConfig',
              'assistant_allowed_groups',
              jsonb_build_object('assistant_allowed_groups', :'old_groups'),
              jsonb_build_object('assistant_allowed_groups', :'new_group')
            );
SQL

            echo "## Updated relevant AppConfig"
            docker exec irba-db-1 psql -U irba -d irba -tAc "select key || '=' || value from \"AppConfig\" where key in ('assistant_allowed_groups','wa_group_jid') order by key;"

            echo "## Smoke: assistant help from IRBA 2026 group"
            export ASSISTANT_API_SECRET=$(grep '^ASSISTANT_API_SECRET=' /opt/irba/.env | cut -d= -f2- | tr -d '"')
            python3 - <<'PY'
import json, os, subprocess, uuid
payload={
  'operation':'help',
  'actor_phone': os.environ.get('ACTOR_PHONE', '+972507666550'),
  'group_jid': os.environ.get('NEW_GROUP', '972507666550-1441540291@g.us'),
  'idempotency_key': str(uuid.uuid4()),
  'params': {},
}
secret=os.environ['ASSISTANT_API_SECRET']
proc=subprocess.run([
  'curl','-sS','http://localhost:3004/api/assistant/v1',
  '-H','content-type: application/json',
  '-H',f'authorization: Bearer {secret}',
  '--data-binary',json.dumps(payload)
], text=True, capture_output=True, check=True)
print(proc.stdout)
resp=json.loads(proc.stdout)
if not resp.get('ok'):
    raise SystemExit('smoke failed')
PY
          REMOTE
