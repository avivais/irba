services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-irba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-irba_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-irba}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-irba} -d ${POSTGRES_DB:-irba}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    init: true
    restart: unless-stopped
    build:
      context: .
      args:
        COMMIT_HASH: ${COMMIT_HASH:-dev}
        COMMIT_DATE: ${COMMIT_DATE:-}
    env_file:
      - .env
    ports:
      - "127.0.0.1:3004:3000"
    environment:
      # Overrides .env localhost URL so the app resolves the `db` service name.
      DATABASE_URL: postgresql://${POSTGRES_USER:-irba}:${POSTGRES_PASSWORD:-irba_dev_password}@db:5432/${POSTGRES_DB:-irba}
      NODE_ENV: production
    volumes:
      - /opt/irba/backups/snapshots:/opt/irba/backups/snapshots
    depends_on:
      db:
        condition: service_healthy

  wa:
    build: ./wa
    init: true
    restart: unless-stopped
    volumes:
      - /opt/irba/wa-session:/app/session
    environment:
      WA_SESSION_PATH: /app/session
    healthcheck:
      # `/status` always responds 200 once the HTTP server is up — a hung event
      # loop will fail the check, prompting Docker to restart the container.
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/status >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
